<h1 class="text-3xl font-bold">
  Todos los productos
  <span class="text-accent">
    {{gender()}}
  </span>
</h1>
<h2 class="text-2xl mb-5">Para todos los gustos</h2>

<!-- <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 mt-2 gap-5"> -->
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2x1:grid-cols-4 gap-3">
  @for (item of productsResource.value()?.products; track $index) {
    <product-card [product]="item" />
  }
  @empty {
    <p>Products not found</p>
  }

</div>
